services:
  ai-triage-demo-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      DEMO_BEARER_TOKEN: "${DEMO_BEARER_TOKEN:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
